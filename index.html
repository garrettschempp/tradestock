// ── Pending Review ────────────────────────────────────────────────────────────
function PendingReview({pending,setPending,items,setItems,logs,setLogs,jobs,notify}){
  const approve=(sub)=>{
    const job=jobs.find(j=>j.id===sub.jobId);
    setItems(prev=>prev.map(item=>{const row=sub.items.find(r=>r.itemId===item.id);return row?{...item,qty:Math.max(0,item.qty-Number(row.qty))}:item;}));
    setLogs(prev=>[{...sub,id:"log"+Date.now(),ts:Date.now(),jobName:job?.name||sub.jobName,reviewed:true},...prev]);
    setPending(p=>p.filter(s=>s.id!==sub.id));
    notify("✓ Approved — inventory updated!");
  };
  const reject=(id)=>{setPending(p=>p.filter(s=>s.id!==id));notify("Rejected.",C.red);};
  return(
    <div style={{maxWidth:780}}>
      <h2 style={{fontWeight:800,fontSize:22,marginBottom:6}}>Pending Review</h2>
      <p style={{color:C.textMuted,fontSize:13,marginBottom:20}}>Crew submissions waiting for approval before inventory is deducted.</p>
      {pending.length===0
        ?<Card><div style={{textAlign:"center",color:C.textMuted,padding:40}}>No pending submissions — all caught up!</div></Card>
        :pending.map(sub=>(
          <Card key={sub.id} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12,gap:12,flexWrap:"wrap"}}>
              <div><div style={{fontWeight:800,fontSize:16}}>{sub.crewName}</div><div style={{color:C.textMuted,fontSize:13,marginTop:2}}>{sub.jobName} · {sub.date}</div></div>
              <div style={{display:"flex",gap:8}}><Btn variant="success" small onClick={()=>approve(sub)}>✓ Approve</Btn><Btn variant="danger" small onClick={()=>reject(sub.id)}>✕ Reject</Btn></div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:sub.notes?10:0}}>
              {sub.items.map((it,i)=>(<span key={i} style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:12}}><strong>{it.qty} {it.unit}</strong><span style={{color:C.textMuted}}> · {it.itemName}</span></span>))}
            </div>
            {sub.notes&&<div style={{fontSize:12,color:C.textMuted,fontStyle:"italic",marginTop:8}}>"{sub.notes}"</div>}
          </Card>
        ))}
    </div>
  );
}

function History({logs,jobs}){

  const visible=[...logs].filter(l=>(jobFilter==="All"||l.jobId===jobFilter)&&(l.crewName.toLowerCase().includes(search.toLowerCase())||l.jobName.toLowerCase().includes(search.toLowerCase()))).sort((a,b)=>b.ts-a.ts);
  return(
    <div>
      <h2 style={{fontWeight:800,fontSize:22,marginBottom:18}}>Usage History</h2>
      <div style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap"}}>
        <Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search crew or job…" style={{maxWidth:260}}/>
        <Sel value={jobFilter} onChange={e=>setJobFilter(e.target.value)} style={{maxWidth:240}}><option value="All">All Jobs</option>{jobs.map(j=><option key={j.id} value={j.id}>{j.name}</option>)}</Sel>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,gap:12}}>
              <div><span style={{fontWeight:800,fontSize:15}}>{log.crewName}</span><span style={{color:C.textMuted,marginLeft:10,fontSize:13}}>{log.jobName}</span></div>
              <div style={{color:C.textDim,fontSize:11,whiteSpace:"nowrap"}}>{new Date(log.ts).toLocaleString()}</div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:log.notes?8:0}}>
              {log.items.map((it,i)=>(<span key={i} style={{background:C.surfaceAlt,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:12}}><strong>{it.qty} {it.unit}</strong><span style={{color:C.textMuted}}> · {it.itemName}</span></span>))}
            </div>
            {log.notes&&<div style={{fontSize:12,color:C.textMuted,fontStyle:"italic"}}>"{log.notes}"</div>}
          </Card>
        ))}
    </div>
  );
}

        <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>📱 Crew Page URL</div>
        <p style={{color:C.textMuted,fontSize:13,marginBottom:12,lineHeight:1.6}}>Share this link with your crew so they can submit job usage reports.</p>
        <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"10px 14px",fontFamily:"monospace",fontSize:13,color:C.accent,wordBreak:"break-all"}}>
          {window.location.origin}/crew.html
        </div>
        <Btn variant="ghost" small style={{marginTop:10}} onClick={()=>{navigator.clipboard.writeText(window.location.origin+"/crew.html");notify("Crew URL copied!");}}>
          Copy Link
        </Btn>
      </Card>

      <Card style={{marginTop:16}}>
        <div style={{fontWeight:800,fontSize:15,marginBottom:4}}>⚠ Data & Storage</div>
        <p style={{color:C.textMuted,fontSize:13,marginBottom:12,lineHeight:1.6}}>
          All your inventory data is stored in <strong style={{color:C.text}}>this browser only</strong>. Always use the same browser on the same device to access your data. Use the Export button in Inventory to back up your data as an Excel file.
        </p>
        <Btn variant="ghost" small onClick={()=>{
          const data={items:lsGet("gb:items"),jobs:lsGet("gb:jobs"),logs:lsGet("gb:logs")};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const a=document.createElement("a");a.href=URL.createObjectURL(blob);
          a.download=`tradestock-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
          notify("Backup downloaded!");
        }}>⬇ Download Full Backup (JSON)</Btn>
      </Card>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
